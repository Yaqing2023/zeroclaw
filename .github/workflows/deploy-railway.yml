name: Build & Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - ".dockerignore"
      - "src/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "workspace/**"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-railway:
    name: Deploy to Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Redeploys
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Service IDs from loyal-youthfulness project
          declare -A SERVICES=(
            ["agent-todd"]="db673953-8bcb-49f1-bac7-83681500513f"
            ["agent-alienclaw"]="ed8208ee-8f0e-4e3d-bc45-ef43271989a6"
            ["agent-jeffwang"]="2a681da0-4179-4dad-a4d5-ead4a234d499"
            ["agent-litianc"]="5de9d701-ac16-469e-9d7c-40d4c0f78d48"
            ["agent-zen7"]="d14870fd-0ee8-48a6-8212-94f263c359c2"
            ["agent-cyan"]="cd5499e1-196a-4cbd-bd2b-5161668d88df"
            ["agent-yaqing2023"]="acc9f450-1d2d-4b4c-b2a5-69edbc4d590d"
            ["agent-bh1ixo"]="cb52eb33-73a6-4d65-a5a0-5532e48a8349"
          )
          
          for name in "${!SERVICES[@]}"; do
            sid="${SERVICES[$name]}"
            echo "Redeploying $name ($sid)..."
            
            response=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"mutation { serviceInstanceRedeploy(serviceId: \\\"$sid\\\") }\"}")
            
            echo "Response: $response"
          done
          
          echo "All redeploys triggered!"
